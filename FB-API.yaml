    AfaMethod:
      description: |
        Enthält die Daten einer AfA-Methode
        Besonderheit beim PUT: Nicht angegebene Properties werden nicht verändert. Es reicht zum Beispiel aus, nur Id und Bezeichnung zu senden, dann wird nur die Bezeichnung der AfA-Methode verändert.
      example:
        LastModified: 2000-01-23T04:56:07.000+00:00
        LastModifiedBy: fb
        Type: LI
        Description: Linear 10 Jahre
        UsefulLifeUnit: IJ
        Percentage: 30.0
        Transition: OP
        Id: "222600000000001"
        AfaMethodKey: L10
        FixedAmount: 400.0
        UsefulLife: 10
        ReminderValue: 1.0
      properties:
        Id:
          description: Id der AfA-Methode (technischer Schlüssel)
          example: "222600000000001"
          nullable: true
          type: string
        AfaMethodKey:
          description: Ordnungsbegriff der AfA-Methode
          example: L10
          nullable: true
          type: string
        Description:
          description: Bezeichnung
          example: Linear 10 Jahre
          nullable: true
          type: string
        Type:
          description: |
            Afa-Art
             * DE - Degressiv
             * DG - Degressive Gebäude-AfA
             * DL - Übergang degressiv nach linear
             * GN - GWG (auf Nutzungsdauer)
             * GW - GWG (Sofortabschreibung)
             * KA - Keine automat. Abschreibung
             * LB - Linear mit festem Betrag
             * LI - Linear auf Nutzungsdauer
             * LP - Linear mit festem Prozentsatz
             * SP - Sammelposten
          example: LI
          nullable: true
          type: string
        Percentage:
          description: Prozentsatz
          example: 30.0
          minimum: 0
          nullable: true
          type: number
        FixedAmount:
          description: Fester Betrag
          example: 400.0
          nullable: true
          type: number
        UsefulLife:
          description: Nutzungsdauer
          example: 10
          nullable: true
          type: integer
        ReminderValue:
          description: Erinnerungswert
          example: 1.0
          nullable: true
          type: number
        Transition:
          description: |
            Uebergang
             * LN - Im letzten Nutzungsjahr
             * OP - Optimiert
          example: OP
          nullable: true
          type: string
        UsefulLifeUnit:
          description: |
            Zeiteinheit Nutzungsdauer
             * IM - In Monaten
             * IJ - In Jahren)
          example: IJ
          nullable: true
          type: string
        LastModified:
          description: Letzte Änderung am
          format: date-time
          nullable: true
          type: string
        LastModifiedBy:
          description: Letzte Änderung durch
          example: fb
          nullable: true
          type: string
      title: AfaMethod
      type: object
