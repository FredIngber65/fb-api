    BalanceSheetAccountPut:
      description: Enthält die Daten eines Sonstigen Bilanzkontos für PUT-Befehl
      example:
        TaxCodeId: 2303VSTF
        Description: Verbindlichkeiten gg. Kreditinstituten
        PresetCostUnitId: "236300000000000000001000"
        NoLongerPostable: false
        InputTax: Free
        ShowNote: false
        RetirementAccount: "1460"
        UserDefinedFields:
        - null
        - null
        Assignment: LiabilityAccount
        PresetCostUnit: "1000"
        Input: Amount
        EitherOr: false
        WithOpenItems: false
        CostCenter: NoCostCenter
        TaxCode: VSTF
        RetirementAccountId: "103000000000053"
        CostUnit: NoCostUnit
        TransferAccountId: "103000000000053"
        Retirement: FixedAccount
        TypeOfTax: NoTax
        QuantityDescription: ""
        PurposeOfAccount: Verbindlichkeiten gegenüber Kreditinstituten
        ChangablePositionElectronicBalanceSheet: false
        DatevAutomaticAccount: false
        TransferAccount: "1460"
        DecimalPlaces: 0
        PresetCostCenter: "100"
        WithCollectivePosting: false
        PresetCostCenterId: "236200000000000000000100"
        BalanceControl: Without
        AccountNumberDatev: 630.0
      properties:
        Description:
          description: Bezeichnung
          example: Verbindlichkeiten gg. Kreditinstituten
          maxLength: 50
          nullable: true
          type: string
        ShowNote:
          description: Notiz beim Buchen anzeigen
          example: false
          nullable: true
          type: boolean
        PurposeOfAccount:
          description: Kontozweck
          example: Verbindlichkeiten gegenüber Kreditinstituten
          maxLength: 255
          nullable: true
          type: string
        Assignment:
          description: |
            Zuordnung - Aktivkonto (AssetAccount) - Passivkonto (LiabilityAccount)
          enum:
          - AssetAccount
          - LiabilityAccount
          example: LiabilityAccount
          nullable: true
          type: string
        BalanceControl:
          description: |
            Saldenprüfung Wert kann nur geändert werden, wenn das Konto nicht in offenen Erfassungsgruppen verwendet wird. - ohne Saldenprüfung (Without) - nur Sollsaldo zulässig (OnlyDebitAllowed) - nur Habensaldo zulässig (OnlyCreditAllowed)
          enum:
          - Without
          - OnlyDebitAllowed
          - OnlyCreditAllowed
          example: Without
          nullable: true
          type: string
        Input:
          description: |
            Eingabe Wert kann nur geändert werden, wenn das Konto nicht in offenen Erfassungsgruppen verwendet wird. Wert kann nur auf Betrags-/Mengeneingabe (AmountQuantity) gesetzt werden, wenn das Erweiterungsmodul "Berichte" aktiviert ist und bei den Einstellungen zum Erweiterungsmodul "Berichte" die Option "Menge bei Sachkonto" ausgewählt ist. - Betragseingabe (Amount) - Betrags-/Mengeneingabe (AmountQuantity)
          enum:
          - Amount
          - AmountQuantity
          example: Amount
          nullable: true
          type: string
        QuantityDescription:
          description: |
            Mengenbezeichnung
          example: ""
          maxLength: 30
          nullable: true
          type: string
        DecimalPlaces:
          description: |
            Nachkommastellen Wert kann nur geändert werden, wenn das Konto nicht in offenen Erfassungsgruppen verwendet wird.
          example: 0
          nullable: true
          type: integer
        CostCenter:
          description: |
            Kostenstelle Wert kann nur geändert werden, wenn das Konto nicht in offenen Erfassungsgruppen verwendet wird. Wert kann nur auf Kann-Kostenstelle oder Muss-Kostenstelle gesetzt werden, wenn das Erweiterungsmodul "Kostenstellen - Kostenträger" aktiviert ist und in den Einstellungen die Verwendung von Kostenstellen ausgewählt ist. Wert kann nur auf Keine Kostenstelle oder Muss-Kostenstelle gesetzt werden, wenn Entweder.. oder... nicht angehakt ist. - Keine Kostenstelle (NoCostCenter) - Kann-Kostenstelle (CanCostCenter) - Muss-Kostenstelle (MustCostCenter)
          enum:
          - NoCostCenter
          - CanCostCenter
          - MustCostCenter
          example: NoCostCenter
          nullable: true
          type: string
        CostUnit:
          description: |
            Kostenträger Wert kann nur geändert werden, wenn das Konto nicht in offenen Erfassungsgruppen verwendet wird. Wert kann nur auf Kann-Kostenträger oder Muss-Kostenträger gesetzt werden, wenn das Erweiterungsmodul "Kostenstellen - Kostenträger" aktiviert ist und in den Einstellungen die Verwendung von Kostenträgern ausgewählt ist. Wert kann nur auf Kein Kostenträger oder Muss-Kostenträger gesetzt werden, wenn Entweder.. oder... nicht angehakt ist. - Kein Kostenträger (NoCostUnit) - Kann-Kostenträger (CanCostUnit) - Muss-Kostenträger (MustCostUnit)
          enum:
          - NoCostUnit
          - CanCostUnit
          - MustCostUnit
          example: NoCostUnit
          nullable: true
          type: string
        EitherOr:
          description: |
            Entweder.. oder... Wert kann nur auf true gesetzt werden, wenn sowohl Kann-Kostenträger als auch Kann-Kostenstelle eingestellt ist. Wert kann nur geändert werden, wenn das Konto nicht in offenen Erfassungsgruppen verwendet wird.
          example: false
          nullable: true
          type: boolean
        PresetCostCenter:
          description: |
            Vorbesetzung Kostenstelle (Ordnungsbegriff) Wert kann nur gesetzt werden, wenn entweder Kann-Kostenstelle oder Muss-Kostenstelle ausgewählt ist. Die Kostenstelle kann entweder über PresetCostCenter oder über PresetCostCenterId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dieselbe Kostenstelle verweisen.
          example: "100"
          nullable: true
          type: string
        PresetCostCenterId:
          description: |
            Id der Vorbesetzung Kostenstelle (technischer Schlüssel) Wert kann nur gesetzt werden, wenn entweder Kann-Kostenstelle oder Muss-Kostenstelle ausgewählt ist. Die Kostenstelle kann entweder über PresetCostCenter oder über PresetCostCenterId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dieselbe Kostenstelle verweisen.
          example: "236200000000000000000100"
          nullable: true
          type: string
        PresetCostUnit:
          description: |
            Vorbesetzung Kostenträger (Ordnungsbegriff) Wert kann nur gesetzt werden, wenn entweder Kann-Kostenträger oder Muss-Kostenträger ausgewählt ist. Der Kostenträger kann entweder über PresetCostUnit oder über PresetCostUnitId angegeben werden.  Werden beide Werte angegeben, müssen sie auf denselben Kostenträger verweisen.
          example: "1000"
          nullable: true
          type: string
        PresetCostUnitId:
          description: |
            Id der Vorbesetzung Kostenträger (technischer Schlüssel) Wert kann nur gesetzt werden, wenn entweder Kann-Kostenträger oder Muss-Kostenträger ausgewählt ist. Der Kostenträger kann entweder über PresetCostUnit oder über PresetCostUnitId angegeben werden.  Werden beide Werte angegeben, müssen sie auf denselben Kostenträger verweisen.
          example: "236300000000000000001000"
          nullable: true
          type: string
        WithOpenItems:
          description: |
            Mit Offenen Posten Wert kann nur geändert werden, wenn das Konto nicht in offenen Erfassungsgruppen verwendet wird.
          example: false
          nullable: true
          type: boolean
        WithCollectivePosting:
          description: Mit Sammelbuchung
          example: false
          nullable: true
          type: boolean
        NoLongerPostable:
          description: |
            Nicht mehr bebuchbar Wert kann nur geändert werden, wenn das Konto nicht in offenen Erfassungsgruppen verwendet wird.
          example: false
          nullable: true
          type: boolean
        ChangablePositionElectronicBalanceSheet:
          description: |
            Konto mit Wechseleigenschaft in E-Bilanz
          example: false
          nullable: true
          type: boolean
        AccountNumberDatev:
          description: |
            DATEV Kontonummer
          example: 630.0
          nullable: true
          type: number
        TypeOfTax:
          description: |
            Steuerart Wert kann nur geändert werden, wenn das Konto nicht in offenen Erfassungsgruppen verwendet wird. - Nicht steuerbar (NoTax) - Mehrwertsteuer (ValueAddedTax) - Vorsteuer (InputTax) - USt. beim Leistungsempfänger (TurnoverTax) - EU sonstige Leistung (EuOtherServices)
          enum:
          - NoTax
          - ValueAddedTax
          - InputTax
          - TurnoverTax
          - EuOtherServices
          example: NoTax
          nullable: true
          type: string
        InputTax:
          description: |
            Steuereingabe Wert kann nicht gesetzt werden, wenn bei der Steuerart "Nicht steuerbar" angegeben ist. Wert kann nur geändert werden, wenn das Konto nicht in offenen Erfassungsgruppen verwendet wird. - Fester Steuerschlüssel aus Steuerkennzeichen (FixedTaxKey) - Vorbesetzter Steuerschlüssel aus Steuerkennzeichen (PresetTaxKey) - Steuerschlüssel beim Buchen eingeben (Free)
          enum:
          - FixedTaxKey
          - PresetTaxKey
          - Free
          example: Free
          nullable: true
          type: string
        TaxCode:
          description: |
            Steuerkennzeichen (Ordnungsbegriff) Wert kann nicht gesetzt werden, wenn bei Steuereingabe "Steuerschlüssel beim Buchen eingeben" oder bei Steuerart "Nicht steuerbar" angegeben ist. Wert kann nur geändert werden, wenn das Konto nicht in offenen Erfassungsgruppen verwendet wird. Das Steuerkennzeichen kann entweder über TaxCode oder über TaxCodeId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dasselbe Steuerkennzeichen verweisen.
          example: VSTF
          nullable: true
          type: string
        TaxCodeId:
          description: |
            Id des Steuerkennzeichens (technischer Schlüssel) Wert kann nicht gesetzt werden, wenn bei Steuereingabe "Steuerschlüssel beim Buchen eingeben" oder bei Steuerart "Nicht steuerbar" angegeben ist. Wert kann nur geändert werden, wenn das Konto nicht in offenen Erfassungsgruppen verwendet wird. Das Steuerkennzeichen kann entweder über TaxCode oder über TaxCodeId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dasselbe Steuerkennzeichen verweisen.
          example: 2303VSTF
          nullable: true
          type: string
        DatevAutomaticAccount:
          description: |
            DATEV-Automatikkonto Wert kann nicht auf true gesetzt werden, wenn bei der Steuerart "Nicht steuerbar" angegeben ist.
          example: false
          nullable: true
          type: boolean
        Retirement:
          description: |
            Ausbuchung Der Wert "Laut Steuerschlüssel" (UseAccountFromTaxKey) kann nicht gesetzt werden, wenn bei der Steuerart "Nicht steuerbar" angegeben ist. - Nicht ausbuchen (NoRetirement) - Dieses Konto verwenden (UseThisAccount) - Laut Steuerschlüssel (UseAccountFromTaxKey) - Festes Konto angeben (FixedAccount)
          enum:
          - NoRetirement
          - UseThisAccount
          - UseAccountFromTaxKey
          - FixedAccount
          example: FixedAccount
          nullable: true
          type: string
        RetirementAccount:
          description: |
            Ausbuchungskonto (Ordnungsbegriff) Wert kann nur gesetzt werden, wenn bei Ausbuchung "Festes Konto angeben" angegeben wurde. Das Ausbuchungskonto kann entweder über RetirementAccount oder über RetirementAccountId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dasselbe Ausbuchungskonto verweisen.
          example: "1460"
          nullable: true
          type: string
        RetirementAccountId:
          description: |
            Id des Ausbuchungskontos (technischer Schlüssel) Wert kann nur gesetzt werden, wenn bei Ausbuchung "Festes Konto angeben" angegeben wurde. Das Ausbuchungskonto kann entweder über RetirementAccount oder über RetirementAccountId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dasselbe Ausbuchungskonto verweisen.
          example: "103000000000053"
          nullable: true
          type: string
        TransferAccount:
          description: |
            Umbuchungskonto (Ordnungsbegriff) Wert kann nur gesetzt werden, wenn in den Einstellungen "Ist-Versteuerung" ausgewählt ist. Das Umbuchungskonto kann entweder über TransferAccount oder über TransferAccountId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dasselbe Umbuchungskonto verweisen.
          example: "1460"
          nullable: true
          type: string
        TransferAccountId:
          description: |
            Id des Umbuchungskontos (technischer Schlüssel) Wert kann nur gesetzt werden, wenn in den Einstellungen "Ist-Versteuerung" ausgewählt ist. Das Umbuchungskonto kann entweder über TransferAccount oder über TransferAccountId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dasselbe Umbuchungskonto verweisen.
          example: "103000000000053"
          nullable: true
          type: string
        UserDefinedFields:
          description: Benutzerdefinierte Felder
          items:
            $ref: '#/components/schemas/UserDefinedFieldRef'
          type: array
          example: null
      title: BalanceSheetAccountPut
      type: object
