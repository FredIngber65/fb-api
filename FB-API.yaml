    TaxKeyPut:
      description: "Enthält die Daten eines Steuerschlüssels für PUT-Befehl. Nicht\
        \ angegebene Properties werden nicht verändert. \n"
      example:
        TypeOfValueAddedTax: Max
        TaxAccount: "1776"
        DeferredTaxAccountId: "103100000000021"
        Description: steuerpfl. Umsätze 19 v.H.
        Percentage: 19.0
        AccountForValueAddedTaxId: "103100000000018"
        AccountForTaxNotDeductible: "1570"
        AccountForTaxNotDeductibleId: "103100000000002"
        DatevTaxKey: DatevTaxKey
        AccountForInputTax: "1578"
        ShortDescription: USt 19 vH
        AccountForValueAddedTax: "1785"
        AccountForDiscount: "8736"
        PostingTypeTaxNotDeductible: IncreaseNetAmount
        UseForOss: false
        LimitedValidity: 2030-12-31
        TaxAccountId: "103100000000021"
        EffectiveFrom: 2007-01-01
        AccountForDiscountId: "102800000000017"
        PercentageTaxNotDeductible: 11.5
        DeferredTaxAccount: "1776"
        AccountForInputTaxId: "103100000000009"
      properties:
        Description:
          description: Bezeichnung
          example: steuerpfl. Umsätze 19 v.H.
          maxLength: 30
          nullable: true
          type: string
        ShortDescription:
          description: Kurzbezeichnung
          example: USt 19 vH
          maxLength: 10
          nullable: true
          type: string
        UseForOss:
          description: |
            Für OSS-Meldungen verwenden Kann nur bei Steuerart Mehwertseteuer auf true gesetzt werden. Kann nur auf true gesetzt werden, wenn die Einstellung "Am OSS-Meldeverfahren teilnehmen" aktiviert ist. Wird der Wert auf true gesetzt, wird ein eventuell vorhandenes "Gültig bis"-Datum gelöscht.
          example: false
          nullable: true
          type: boolean
        TypeOfValueAddedTax:
          description: |
            Umsatzsteuertyp - reduzierter Steuersatz (Reduced) - voller Steuersatz (Max)
          enum:
          - Reduced
          - Max
          example: Max
          nullable: true
          type: string
        DatevTaxKey:
          description: |
            DATEV Steuerschlüssel (nur Zahlen im Bereich 0-9999 zulässig) example: "3"
          nullable: true
          pattern: "^\\d{1,4}$"
          type: string
        EffectiveFrom:
          description: Gültig ab
          example: 2007-01-01
          format: date
          nullable: true
          type: string
        LimitedValidity:
          description: |
            Gültig bis Kann nicht gesetzt werden, wenn "Für OSS-Meldungen verwenden" ausgewählt ist.
          example: 2030-12-31
          format: date
          nullable: true
          type: string
        Percentage:
          description: "Prozentsatz Kann nur gesetzt werden, wenn als Steuerart Mehrwertsteuer,\
            \ Vorsteuer oder USt. beim Leistungsempfänger ausgewählt wurde. Kann nur\
            \ geändert werden, wenn es keine Buchungen mit diesem Steuerschlüssel\
            \ gibt. \n"
          example: 19.0
          maximum: 99.99
          minimum: 0
          nullable: true
          type: number
        TaxAccount:
          description: |
            Steuerkonto (Ordnungsbegriff) Kann nur gesetzt werden, wenn als Steuerart Mehrwertsteuer oder Vorsteuer ausgewählt und ein Prozentsatz ungleich 0 angegeben wurde. Kann nur geändert werden, wenn es keine Buchungen in offenen Erfassungsgruppen mit diesem Steuerschlüssel gibt. Das Steuerkonto kann entweder über TaxAccount oder über TaxAccountId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dasselbe Konto verweisen.
          example: "1776"
          nullable: true
          type: string
        TaxAccountId:
          description: |
            Id des Steuerkontos (technischer Schlüssel) Kann nur gesetzt werden, wenn als Steuerart Mehrwertsteuer oder Vorsteuer ausgewählt und ein Prozentsatz ungleich 0 angegeben wurde. Kann nur geändert werden, wenn es keine Buchungen in offenen Erfassungsgruppen mit diesem Steuerschlüssel gibt. Das Steuerkonto kann entweder über TaxAccount oder über TaxAccountId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dasselbe Konto verweisen.
          example: "103100000000021"
          nullable: true
          type: string
        DeferredTaxAccount:
          description: |
            Steuerkonto nicht fällig (Ordnungsbegriff) Kann nur gesetzt werden, wenn als Steuerart Mehrwertsteuer ausgewählt wurde. Kann nur geändert werden, wenn es keine Buchungen in offenen Erfassungsgruppen mit diesem Steuerschlüssel gibt. Das Steuerkonto nicht fällig kann entweder über DeferredTaxAccount oder über DeferredTaxAccountId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dasselbe Konto verweisen.
          example: "1776"
          nullable: true
          type: string
        DeferredTaxAccountId:
          description: |
            Id des Steuerkontos nicht fällig (technischer Schlüssel) Kann nur gesetzt werden, wenn als Steuerart Mehrwertsteuer ausgewählt wurde. Kann nur geändert werden, wenn es keine Buchungen in offenen Erfassungsgruppen mit diesem Steuerschlüssel gibt. Das Steuerkonto nicht fällig kann entweder über DeferredTaxAccount oder über DeferredTaxAccountId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dasselbe Konto verweisen.
          example: "103100000000021"
          nullable: true
          type: string
        AccountForInputTax:
          description: |
            Steuerkonto für Vorsteuer (Ordnungsbegriff) Kann nur gesetzt werden, wenn als Steuerart USt. beim Leistungsempfänger ausgewählt wurde und ein Prozentsatz ungleich 0 angegeben wurde. Kann nur geändert werden, wenn es keine Buchungen in offenen Erfassungsgruppen mit diesem Steuerschlüssel gibt. Das Steuerkonto für Vorsteuer kann entweder über AccountForInputTax oder über AccountForInputTaxId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dasselbe Konto verweisen.
          example: "1578"
          nullable: true
          type: string
        AccountForInputTaxId:
          description: |
            Id des Steuerkontos für Vorsteuer (technischer Schlüssel) Kann nur gesetzt werden, wenn als Steuerart USt. beim Leistungsempfänger ausgewählt wurde und ein Prozentsatz ungleich 0 angegeben wurde. Kann nur geändert werden, wenn es keine Buchungen in offenen Erfassungsgruppen mit diesem Steuerschlüssel gibt. Das Steuerkonto für Vorsteuer kann entweder über AccountForInputTax oder über AccountForInputTaxId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dasselbe Konto verweisen.
          example: "103100000000009"
          nullable: true
          type: string
        AccountForValueAddedTax:
          description: |
            Steuerkonto für Umsatzsteuer (Ordnungsbegriff) Kann nur gesetzt werden, wenn als Steuerart USt. beim Leistungsempfänger ausgewählt wurde und ein Prozentsatz ungleich 0 angegeben wurde. Kann nur geändert werden, wenn es keine Buchungen in offenen Erfassungsgruppen mit diesem Steuerschlüssel gibt. Das Steuerkonto für Umsatzsteuer kann entweder über AccountForValueAddedTax oder über AccountForValueAddedTaxId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dasselbe Konto verweisen.
          example: "1785"
          nullable: true
          type: string
        AccountForValueAddedTaxId:
          description: |
            Id des Steuerkontos für Umsatzsteuer (technischer Schlüssel) Kann nur gesetzt werden, wenn als Steuerart USt. beim Leistungsempfänger ausgewählt wurde und ein Prozentsatz ungleich 0 angegeben wurde. Kann nur geändert werden, wenn es keine Buchungen in offenen Erfassungsgruppen mit diesem Steuerschlüssel gibt. Das Steuerkonto für Umsatzsteuer kann entweder über AccountForValueAddedTax oder über AccountForValueAddedTaxId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dasselbe Konto verweisen.
          example: "103100000000018"
          nullable: true
          type: string
        AccountForDiscount:
          description: |
            Ausbuchungskonto (Ordnungsbegriff) Kann nur geändert werden, wenn es keine Buchungen in offenen Erfassungsgruppen mit diesem Steuerschlüssel gibt. Das Ausbuchungskonto kann entweder über AccountForDiscount oder über AccountForDiscountId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dasselbe Konto verweisen.
          example: "8736"
          nullable: true
          type: string
        AccountForDiscountId:
          description: |
            Id des Ausbuchungskontos (technischer Schlüssel) Kann nur geändert werden, wenn es keine Buchungen in offenen Erfassungsgruppen mit diesem Steuerschlüssel gibt. Das Ausbuchungskonto kann entweder über AccountForDiscount oder über AccountForDiscountId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dasselbe Konto verweisen.
          example: "102800000000017"
          nullable: true
          type: string
        PercentageTaxNotDeductible:
          description: |
            Anteil der nicht abzugsfähigen Vorsteuer Kann nur gesetzt werden, wenn als Steuerart Vorsteuer oder USt. beim Leistungsempfänger ausgewählt, beim Steuerkennzeichen "Vorsteuer nicht voll abzugsfähig" aktiviert wurde. Kann nur geändert werden, wenn es keine Buchungen in offenen Erfassungsgruppen mit diesem Steuerschlüssel gibt.
          example: 11.5
          maximum: 99.99
          minimum: 0
          nullable: true
          type: number
        PostingTypeTaxNotDeductible:
          description: "Anteil der nicht abzugsfähigen Vorsteuer buchen Kann nur auf\
            \ \"IncreaseNetAmount\" gesetzt werden, wenn als Steuerart Vorsteuer ausgewä\
            hlt wurde. Kann nur auf \"Fixed Account\" gesetzt werden, wenn als Steuerart\
            \ Vorsteuer oder USt. beim Leistungsempfänger ausgewählt wurde. Kann nur\
            \ gesetzt werden, wenn beim Steuerkennzeichen \"Vorsteuer nicht voll abzugsfä\
            hig\" aktiviert wurde. Kann nur geändert werden, wenn es keine Buchungen\
            \ in offenen Erfassungsgruppen mit diesem Steuerschlüssel gibt. - Nettobetrag\
            \ erhöhen (IncreaseNetAmount) - Auf festes Konto (FixedAccount)      \
            \      \n"
          enum:
          - IncreaseNetAmount
          - FixedAccount
          example: IncreaseNetAmount
          nullable: true
          type: string
        AccountForTaxNotDeductible:
          description: |
            Konto für nicht abzugsfähige Vorsteuer (Ordnungsbegriff) Kann nur gesetzt werden, wenn als Steuerart Vorsteuer oder USt. beim Leistungsempfänger ausgewählt und beim Steuerkennzeichen "Vorsteuer nicht voll abzugsfähig" aktiviert wurde. Kann nur geändert werden, wenn es keine Buchungen in offenen Erfassungsgruppen mit diesem Steuerschlüssel gibt. Das Konto für nicht abzugsfähige Vorsteuer kann entweder über AccountForTaxNotDeductible oder über AccountForTaxNotDeductibleId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dasselbe Konto verweisen.
          example: "1570"
          nullable: true
          type: string
        AccountForTaxNotDeductibleId:
          description: |
            Id des Kontos für nicht abzugsfähige Vorsteuer (technischer Schlüssel) Kann nur gesetzt werden, wenn als Steuerart Vorsteuer oder USt. beim Leistungsempfänger ausgewählt und beim Steuerkennzeichen "Vorsteuer nicht voll abzugsfähig" aktiviert wurde. Kann nur geändert werden, wenn es keine Buchungen in offenen Erfassungsgruppen mit diesem Steuerschlüssel gibt. Das Konto für nicht abzugsfähige Vorsteuer kann entweder über AccountForTaxNotDeductible oder über AccountForTaxNotDeductibleId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dasselbe Konto verweisen.
          example: "103100000000002"
          nullable: true
          type: string
