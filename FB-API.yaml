          nullable: true
          type: string
        LossOfReceivables:
          description: |
            Forderungsverlust Wert kann nur auf true gesetzt werden, wenn es sich um eine deutsche Firma handelt und als Steuerart Mehrwertsteuer ausgewählt ist. Bei Ist-Versteuerung darf außerdem kein Umbuchungskonto angegeben sein.
          example: false
          nullable: true
          type: boolean
        LiabilityReduction:
          description: |
