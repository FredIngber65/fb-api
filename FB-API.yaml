        Location:
          description: |
            Standort (Ordnungsbegriff) Der Standort kann entweder über Location oder über LocationId angegeben werden.  Werden beide Werte angegeben, müssen sie auf denselben Standort verweisen.
          example: BER
          nullable: true
          type: string
        LocationId:
          description: |
            Id des Standorts (technischer Schlüssel) Der Standort kann entweder über Location oder über LocationId angegeben werden.  Werden beide Werte angegeben, müssen sie auf denselben Standort verweisen.
          example: "239800000000007"
          nullable: true
          type: string
        SerialNumber:
          description: Seriennummer
          example: Fahrgestell 11487B556
          nullable: true
          type: string
        DepreciationMethod:
          description: |
            Abschreibungsmethode (Ordnungsbegriff) Kann nur geändert werden, wenn noch keine automatische Abschreibung auf der Anlage stattgefunden hat. Die Abschreibungsmethode kann entweder über DepreciationMethod oder über DepreciationMethodId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dieselbe Abschreibungsmethode verweisen.
          example: L10
          nullable: true
          type: string
        DepreciationMethodId:
          description: |
            Id der Abschreibungsmethode (technischer Schlüssel) Kann nur geändert werden, wenn noch keine automatische Abschreibung auf der Anlage stattgefunden hat. Die Abschreibungsmethode kann entweder über DepreciationMethod oder über DepreciationMethodId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dieselbe Abschreibungsmethode verweisen.
          example: L10
          nullable: true
          type: string
        GroupAssetNumber:
          description: |
            Sammelpostennummer Kann nur geändert werden, wenn eine Abschreibungsmethode der Abschreibungsart "Sammelposten" ausgewählt wurde.
          example: 2026
          maximum: 999999999999
          minimum: 1
          nullable: true
          type: number
        AcquisitionDate:
          description: |
            Anschaffungsdatum Kann nur geändert werden, wenn noch keine automatische Abschreibung auf der Anlage stattgefunden hat.
          example: 2023-01-19
          format: date
          nullable: true
          type: string
        DepreciationStartDate:
          description: |
            Abschreibungsbeginn Kann nur geändert werden, wenn noch keine automatische Abschreibung auf der Anlage stattgefunden hat und keine Abschreibungsmethode der Abschreibungsart "Sammelposten" ausgewählt wurde.
          example: 2021-01-19
          format: date
          nullable: true
          type: string
        Quantity:
          description: |
            Menge Kann nur geändert werden, wenn als Abschreibungsmethode "GWG (Sofortabschreibung)", "GWG (auf Nutzungsdauer)" oder "Sammelposten" ausgewählt ist.
          example: 5
          maximum: 999999999
          minimum: -999999999
          nullable: true
          type: number
        IsActive:
          example: true
          nullable: true
          type: boolean
        ActiveUntil:
          description: |
            Aktiv bis Kann nur gesetzt werden, wenn die Anlage nicht aktiv ist.
          example: 2025-10-20
          format: date
          nullable: true
          type: string
        CostCenter:
          description: |
            Kostenstelle (Ordnungsbegriff) Die Kostenstelle kann entweder über CostCenter oder über CostCenterId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dieselbe Kostenstelle verweisen.
          example: "100"
          nullable: true
          type: string
        CostCenterId:
          description: |
            Id der Kostenstelle (technischer Schlüssel) Die Kostenstelle kann entweder über CostCenter oder über CostCenterId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dieselbe Kostenstelle verweisen.
          example: "236200000000000000000100"
          nullable: true
          type: string
        CostUnit:
          description: |
            Kostenträger (Ordnungsbegriff) Der Kostenträger kann entweder über CostUnit oder über CostUnitId angegeben werden.  Werden beide Werte angegeben, müssen sie auf denselben Kostenträger verweisen.
          example: "1000"
          nullable: true
          type: string
        CostUnitId:
          description: |
            Id der Kostenträger (technischer Schlüssel) Der Kostenträger kann entweder über CostUnit oder über CostUnitId angegeben werden.  Werden beide Werte angegeben, müssen sie auf denselben Kostenträger verweisen.
          example: "236300000000000000001000"
          nullable: true
          type: string
        IsFullyRecorded:
          description: Anlage ist vollständig erfasst
          example: false
          nullable: true
          type: boolean
        DepreciationChangeStartingInYear:
          description: |
            Übergang von der degressiven zur linearen Abschreibung ab Jahr Kann nur geändert werden, wenn eine Abschreibungsmethode der Abschreibungsart "Übergang degressiv nach linear" ausgewählt wurde, bei der als Übergang "Optimiert" ausgewählt ist.
          example: 6
          maximum: 9999
          minimum: 0
          nullable: true
          type: integer
        UserDefinedFields:
          description: Benutzerdefinierte Felder
          items:
            $ref: '#/components/schemas/UserDefinedFieldRef'
          type: array
          example: null
