      type: object
    DunningLevelPostPut:
      description: |
        Enthält die Daten einer Mahnstufe für POST- und PUT-Befehl
        Besonderheit beim PUT: Nicht angegebene Properties werden nicht verändert. Es reicht zum Beispiel aus, nur Id und Bezeichnung zu senden, dann wird nur die Bezeichnung der Mahnstufe verändert.
      example:
        ClosingText: ""
        MinimumNumberOfDays: 14
        ArrearsFee: 0.0
        IntroductoryText: "Es wird Ihrer Aufmerksamkeit sicherlich entgangen sein,\
          \ dass die aufgeführten Beträge zur Zahlung fällig sind. Wir erwarten nunmehr\
          \ Ihre Überweisung. Zahlungseingänge sind berücksichtigt bis zum <ZAHLUNGSEINGANG_BIS_DATUM>."
        DunningLevel: 1
        DebtCollection: false
        WithInterestOnArrears: false
        ReferenceDate: MaturityDate
        Salutation: ""
        Subject: Mahnung Kunde <KUNDENNUMMER>
      properties:
        DunningLevel:
          description: |
            Mahnstufe Bei Übergabe eines Arrays von Mahnstufen im POST eines Mahntyps müssen die Stufen bei 1 beginnend und lückenlos aufsteigend übergeben werden. Beim POST einer einzelnen Mahnstufe wird der Wert automatisch gesetzt und muss nicht angegeben werden. Wenn er angegeben wird, muss er der nächsthöheren Mahnstufe entsprechen. Beim PUT kann der Wert nicht geändert werden.
          example: 1
          nullable: true
          type: integer
        MinimumNumberOfDays:
          description: "Anzahl Tage, die zum Mahndatum mindestens vergangen sein mü\
            ssen, damit ein Offener Posten zur Mahnung ausgewählt wird."
          example: 14
          maximum: 999
          minimum: 0
          nullable: true
          type: integer
        ReferenceDate:
          description: "Gibt an, nach welchem Datum sich die Anzahl Tage richtet,\
            \ die zum Mahndatum mindestens vergangen sein müssen (MinimumNumberOfDays)\
            \ - Fälligkeitsdatum (MaturityDate) - Letzte Mahnung (LastDunning)"
          enum:
          - MaturityDate
          - LastDunning
          example: MaturityDate
          nullable: true
          type: string
        ArrearsFee:
          description: |
            Mahngebühr Wert kann nur angegeben werden, wenn Inkasso nicht aktiviert ist (DebtCollection = false).
          example: 0.0
          format: double
          maximum: 9999999999999.99
          minimum: 0.0
          nullable: true
          type: number
        WithInterestOnArrears:
          description: |
            Verzugszinsen ausweisen Wert kann nur angegeben werden, wenn Inkasso nicht aktiviert ist (DebtCollection = false).
          example: false
          nullable: true
          type: boolean
        IntroductoryText:
          description: |
            Einleitender Text Wert kann nur angegeben werden, wenn Inkasso nicht aktiviert ist (DebtCollection = false). Das Feld erlaubt die Eingabe von Platzhaltern. Folgende Platzhalter sind zulässig - <ZUSATZDATUM_1> - <ZUSATZDATUM_2> - <ZAHLUNGSEINGANG_BIS_DATUM> - <DATUM_LETZTE_MAHNUNG>
          example: "Es wird Ihrer Aufmerksamkeit sicherlich entgangen sein, dass die\
            \ aufgeführten Beträge zur Zahlung fällig sind. Wir erwarten nunmehr Ihre\
            \ Überweisung. Zahlungseingänge sind berücksichtigt bis zum <ZAHLUNGSEINGANG_BIS_DATUM>."
          maxLength: 2000
          nullable: true
          type: string
        ClosingText:
          description: |
            Abschließender Text Wert kann nur angegeben werden, wenn Inkasso nicht aktiviert ist (DebtCollection = false). Das Feld erlaubt die Eingabe von Platzhaltern. Folgende Platzhalter sind zulässig - <ZUSATZDATUM_1> - <ZUSATZDATUM_2> - <ZAHLUNGSEINGANG_BIS_DATUM> - <DATUM_LETZTE_MAHNUNG>
          example: ""
          maxLength: 2000
          nullable: true
          type: string
        Subject:
          description: "Betreff Wert kann nur angegeben werden, wenn Inkasso nicht\
            \ aktiviert ist (DebtCollection = false). Das Feld erlaubt die Eingabe\
            \ von Platzhaltern. Folgende Platzhalter sind zulässig - <KUNDENNUMMER>\
            \ - <LIEFERANTENNUMMER> \n"
          example: Mahnung Kunde <KUNDENNUMMER>
          maxLength: 100
          nullable: true
          type: string
        Salutation:
          description: "Anrede Wert kann nur angegeben werden, wenn Inkasso nicht\
            \ aktiviert ist (DebtCollection = false). Das Feld erlaubt die Eingabe\
            \ von Platzhaltern. Folgende Platzhalter sind zulässig - <ANREDE> - <NAME1>\
            \ - <NAME2>  - <NAME3> - <ZUSATZ1>  - <ZUSATZ2>  - <ZUSATZ3> \n"
          example: ""
          maxLength: 100
          nullable: true
          type: string
        DebtCollection:
          description: Inkasso
          example: false
          nullable: true
          type: boolean
      title: DunningLevelPostPut
      type: object
