        Area:
          description: "Bereich, für den das benutzerdefinierte Feld definiert ist."
          example: Kunde
          nullable: true
          type: string
        Number:
          description: Nummer des benutzerdefinierten Felds. Anzeige-Reihenfolge der
            benutzerdefinierten Felder (optional).
