        schema:
          nullable: true
          type: integer
      - description: "Gibt an, wie viele Elemente der Gesamtmenge übersprungen werden\
          \ sollen. \nBeispiel: ...skip=10...\n"
        in: query
        name: skip
        required: false
        schema:
          nullable: true
          type: integer
      - description: |
