        \ ne (ungleich), lt (kleiner als), gt (größer als), le (kleiner gleich), ge\
        \ (größer gleich)\nMehrere Filter können durch \"and\" getrennt werden. \n\
        Beispiel: ...filter=AccountNumber ge 1 and StockNumber le 9999...\n"
      in: query
      name: filter
      required: false
      schema:
        nullable: true
        type: string
    SelectParam:
