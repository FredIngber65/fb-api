        DunningType:
          description: |
            Mahnungstyp (Ordnungsbegriff) Der Wert kann nicht bei Einmalkonten angegeben werden. Der Mahnungstyp kann entweder über DunningType oder über DunningTypeId angegeben werden.  Werden beide Werte angegeben, müssen sie auf denselben Mahnungstyp verweisen.
