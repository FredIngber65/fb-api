      properties:
        OpenItemNumber:
          description: OP-Nummer
          example: 1001
          maximum: 999999999999
          minimum: 1
          nullable: true
          type: number
        ExternalInvoiceNumber:
          description: Fremdbelegnummer
          example: A5678
          maxLength: 40
          nullable: true
          type: string
        Text:
          description: OP-Text
          example: Eingangsrechnung
          maxLength: 60
          nullable: true
          type: string
        AssignedReceivables:
          description: Forderungen abgetreten
          example: false
          nullable: true
          type: boolean
        AssignedReceivablesRemark:
          description: |
            Zessionsvermerk Kann nur gesetzt werden, wenn "Forderungen abgetreten" wahr ist.
          example: Forderungen abgetreten an Inkasso
          maxLength: 100
          nullable: true
          type: string
        ContentiousOpenItem:
          description: Strittiger OP
          example: false
          nullable: true
          type: boolean
        LastDunningLevel:
          description: |
            Letzte Mahnstufe Kann nur gesetzt werden, wenn beim Konto die Mahnung erlaubt ist.
          example: 1
          maximum: 999
          minimum: 0
          nullable: true
          type: integer
        LastDunningDate:
          description: |
            Letztes Mahndatum Kann nur gesetzt werden, wenn beim Konto die Mahnung erlaubt ist.
          example: 2026-01-30
          format: date
          nullable: true
          type: string
        DunningType:
          description: |
            Mahnungstyp (Ordnungsbegriff) Kann nur gesetzt werden, wenn der Offene Posten zu einem Kundenkonto gehört. Der Mahnungstyp kann entweder über DunningType oder über DunningTypeId angegeben werden.  Werden beide Werte angegeben, müssen sie auf denselben Mahntyp verweisen.
          example: MS3
          maxLength: 3
          nullable: true
          type: string
        DunningTypeId:
          description: |
            Id des Mahnungstyps (technischer Schlüssel) Kann nur gesetzt werden, wenn der Offene Posten zu einem Kundenkonto gehört. Der Mahnungstyp kann entweder über DunningType oder über DunningTypeId angegeben werden.  Werden beide Werte angegeben, müssen sie auf denselben Mahntyp verweisen.
          example: "201200000000003"
          nullable: true
          type: string
        DunningAllowed:
          description: |
            OP im Mahnungslauf berücksichtigen Kann nur auf true gesetzt werden, wenn der Offene Posten zu einem Kundenkonto gehört.
          example: false
          nullable: true
          type: boolean
        PaymentAllowed:
          description: |
            OP im Zahlungslauf berücksichtigen Kann nur auf true gesetzt werden, wenn der Offene Posten zu einem Kunden- oder einem Lieferantenkonto gehört.
          example: true
          nullable: true
          type: boolean
        DirectDebitAllowed:
          description: |
            OP im Lastschriftlauf berücksichtigen Kann nur auf true gesetzt werden, wenn das Modul Lastschriften aktiviert ist und der Offene Posten zu einem Kundenkonto gehört, ausgenommen Einmalkunden.
          example: false
          nullable: true
          type: boolean
        SepaMandat:
          description: |
            SEPA-Mandat (Ordnungsbegriff) Kann nur gesetzt werden, wenn der Offene Posten zu einem Kundenkonto gehört, ausgenommen Einmalkunden. Das SEPA-Mandat kann entweder über SepaMandat oder über SepaMandatId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dasselbe Mandat verweisen.
          example: 10022-0001
          maxLength: 35
          nullable: true
          type: string
        SepaMandatId:
          description: |
            Id des SEPA-Mandats (technischer Schlüssel) Kann nur gesetzt werden, wenn der Offene Posten zu einem Kundenkonto gehört, ausgenommen Einmalkunden. Das SEPA-Mandat kann entweder über SepaMandat oder über SepaMandatId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dasselbe Mandat verweisen.
          example: "209300000000001"
          nullable: true
          type: string
        PaymentType:
          description: |
            Zahlungsart Kann nur bei Einmalkunden und Einmallieferanten gesetzt werden. - Nur Überweisung (OnlyBanktransfer) - Nur Scheck (OnlyCheque) - Scheck/Überweisung (BanktransferOrCheque)
          enum:
          - OnlyBanktransfer
          - OnlyCheque
          - BanktransferOrCheque
          example: BanktransferOrCheque
          nullable: true
          type: string
        TermOfPayment:
          description: |
            Zahlungsbedingung (Ordnungsbegriff) Die Zahlungsbedingung kann entweder über TermOfPayment oder über TermOfPaymentId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dieselbe Zahlungsbedingung verweisen.
          example: "N"
          maxLength: 3
          nullable: true
          type: string
        TermOfPaymentId:
          description: |
            Id der Zahlungsbedingung (technischer Schlüssel) Die Zahlungsbedingung kann entweder über TermOfPayment oder über TermOfPaymentId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dieselbe Zahlungsbedingung verweisen.
          example: 1007N
          nullable: true
          type: string
        Instalment:
          description: In Raten
          example: false
          nullable: true
          type: boolean
        ReferenceDate:
          description: |
            Bezugsdatum Kann nur gesetzt werden, wenn der Offene Posten nicht in Raten gezahlt wird.
          example: 2019-01-04
          format: date
          nullable: true
          type: string
        Discount1Percentage:
          description: |
            Skonto 1 Prozent Kann nur gesetzt werden, wenn der Offene Posten nicht in Raten gezahlt wird. Wenn eine Zahlungsbedingung angegeben wurde, dann muss der hier übergebene Wert mit dem anhand der Zahlungsbedingung berechneten Wert übereinstimmen.
          example: 0.0
          maximum: 999.99
          minimum: 0.0
          nullable: true
          type: number
        Discount1Amount:
          description: |
            Skonto 1 Betrag Kann nur gesetzt werden, wenn der Offene Posten nicht in Raten gezahlt wird. Wenn eine Zahlungsbedingung angegeben wurde, dann muss der hier übergebene Wert mit dem anhand der Zahlungsbedingung berechneten Wert übereinstimmen. Wird sowohl für Skonto 1 Betrag als auch für Skonto 1 Prozent ein Wert übergeben, dann müssen diese Werte rechnerisch zusammenpassen.
          example: 0.0
          nullable: true
          type: number
        Discount1DueDate:
          description: |
            Skonto 1 fällig bis Datum Kann nur gesetzt werden, wenn der Offene Posten nicht in Raten gezahlt wird und Skonto 1 Prozent bzw. Skonto 1 Betrag einen Wert hat. Wenn eine Zahlungsbedingung angegeben wurde, dann muss der hier übergebene Wert mit dem anhand der Zahlungsbedingung berechneten Wert übereinstimmen.
          example: 2019-01-04
          format: date
          nullable: true
          type: string
        Discount2Percentage:
          description: |
            Skonto 2 Prozent Kann nur gesetzt werden, wenn der Offene Posten nicht in Raten gezahlt wird und Skonto 1 festgelegt ist. Wenn eine Zahlungsbedingung angegeben wurde, dann muss der hier übergebene Wert mit dem anhand der Zahlungsbedingung berechneten Wert übereinstimmen.
          example: 0.0
          maximum: 999.99
          minimum: 0.0
          nullable: true
          type: number
        Discount2Amount:
          description: |
            Skonto 2 Betrag Kann nur gesetzt werden, wenn der Offene Posten nicht in Raten gezahlt wird und Skonto 1 festgelegt ist. Wenn eine Zahlungsbedingung angegeben wurde, dann muss der hier übergebene Wert mit dem anhand der Zahlungsbedingung berechneten Wert übereinstimmen. Wird sowohl für Skonto 2 Betrag als auch für Skonto 2 Prozent ein Wert übergeben, dann müssen diese Werte rechnerisch zusammenpassen.
          example: 0.0
          nullable: true
          type: number
        Discount2DueDate:
          description: |
            Skonto 2 fällig bis Datum Kann nur gesetzt werden, wenn der Offene Posten nicht in Raten gezahlt wird, Skonto 1 festgelegt ist und Skonto 2 Prozent bzw. Skonto 2 Betrag einen Wert hat. Wenn eine Zahlungsbedingung angegeben wurde, dann muss der hier übergebene Wert mit dem anhand der Zahlungsbedingung berechneten Wert übereinstimmen.
          example: 2019-01-04
          format: date
          nullable: true
          type: string
        NetDate:
          description: |
            Netto fällig Datum Kann nur gesetzt werden, wenn der Offene Posten nicht in Raten gezahlt wird. Wenn eine Zahlungsbedingung angegeben wurde, dann muss der hier übergebene Wert mit dem anhand der Zahlungsbedingung berechneten Wert übereinstimmen.
          example: 2019-01-04
          format: date
          nullable: true
          type: string
        NumberOfInstalments:
          description: |
            Anzahl Raten Kann nur gesetzt werden, wenn der Offene Posten in Raten gezahlt wird. Wenn eine Zahlungsbedingung angegeben wurde, dann muss der hier übergebene Wert mit dem in der Zahlungsbedingung angegebenen Wert übereinstimmen.
          example: 4
          minimum: 0
          nullable: true
          type: integer
        MethodOfPayment:
          description: |
            Zahlungsweise Kann nur gesetzt werden, wenn der Offene Posten in Raten gezahlt wird. Wenn eine Zahlungsbedingung angegeben wurde, dann muss der hier übergebene Wert mit dem in der Zahlungsbedingung angegebenen Wert übereinstimmen. - Wöchentlich (Weekly) - 14-Täglich (Biweekly) - Monatlich (Monthly) - Quartalsweise (Quarterly) - Halbjährlich (SixMonthly) - Jährlich (Annual)
          enum:
          - Weekly
          - Biweekly
          - Monthly
          - Quarterly
          - SixMonthly
          - Annual
          - NotDefined
          example: Biweekly
          nullable: true
          type: string
        AmountOfInstalment:
          description: |
            Rate Kann nur gesetzt werden, wenn der Offene Posten in Raten gezahlt wird. Wenn eine Zahlungsbedingung angegeben wurde, dann muss der hier übergebene Wert mit dem anhand der Zahlungsbedingung berechneten Wert übereinstimmen.
          example: 25.98
          nullable: true
          type: number
        DateOfFirstInstalment:
          description: |
            Erste Rate Kann nur gesetzt werden, wenn der Offene Posten in Raten gezahlt wird. Wenn eine Zahlungsbedingung angegeben wurde, dann muss der hier übergebene Wert mit dem anhand der Zahlungsbedingung berechneten Wert übereinstimmen.
          example: 2026-01-04
          format: date
          nullable: true
          type: string
        BillingAdress:
          $ref: '#/components/schemas/OpenItemAddress'
        IBAN:
          description: |
            IBAN Kann nur bei Einmalkunden und Einmallieferanten angegeben werden.
          example: DE91100000000123456789
          maxLength: 34
          nullable: true
          type: string
        Bank:
          description: |
            Bank (Ordnungsbegriff) Kann nur bei Einmalkunden und Einmallieferanten angegeben werden. Die Bank kann entweder über Bank oder über BankId angegeben werden. Werden beide Werte angegeben, müssen sie auf dieselbe Bank verweisen.
          example: "10010010"
          maxLength: 20
          nullable: true
          type: string
        BankId:
          description: |
            Id der Bank (technischer Schlüssel) Kann nur bei Einmalkunden und Einmallieferanten angegeben werden. Die Bank kann entweder über Bank oder über BankId angegeben werden. Werden beide Werte angegeben, müssen sie auf dieselbe Bank verweisen.
          example: "100200000000002"
          nullable: true
          type: string
        BankAccountNumber:
          description: |
            Kontonummer der Bank Kann nur bei Einmalkunden und Einmallieferanten angegeben werden.
          example: "123456789"
          maxLength: 35
          nullable: true
          type: string
        AccountHolder:
          description: |
            Kontoinhaber Kann nur bei Einmalkunden und Einmallieferanten angegeben werden.
          example: Max Mustermann
          maxLength: 70
          nullable: true
          type: string
        UserDefinedFields:
          description: Benutzerdefinierte Felder
          items:
            $ref: '#/components/schemas/UserDefinedFieldRef'
          type: array
          example: null
      title: OpenItemPut
      type: object
