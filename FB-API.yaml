        Name: OP-Zahlung
        DecimalPlaces: 2
        LastModified: 2000-01-23T04:56:07.000+00:00
        Area: Kunde
        Type: Alphanumeric
        DefinedDefaultValue: D
        IsRequired: false
        Number: 1
        HasAttributes: false
        Length: 6
        Id: "101700000000001"
        ShowThousandsSeparator: false
        IsOnlyAttributeAllowed: false
        HasIndex: false
        DefaultValueType: None
