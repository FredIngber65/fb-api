          $ref: '#/components/schemas/OpenItemInAccountingRecord'
        OpenItemAddress:
          $ref: '#/components/schemas/OpenItemAddressPutPost'
        OpenItemBankDetails:
          $ref: '#/components/schemas/BankDetails'
