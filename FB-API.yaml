            Id der Bank (technischer Schlüssel) Der Wert kann nicht bei Einmalkonten angegeben werden. Die Bank kann entweder über Bank oder über BankId angegeben werden.  Werden beide Werte angegeben, müssen sie auf dieselbe Bank verweisen.
          nullable: true
          type: string
          example: null
