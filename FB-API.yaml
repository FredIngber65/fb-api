      description: "Enthält die Daten eines Mahntyps für PUT-Befehl. Nicht angegebene\
        \ Properties werden nicht verändert. \n"
      example:
        NumberOfRepeats: 1
        Description: Standard
        DeliveryMethod: Email
        PostArrearsFeeAndInterest: false
        RepeatLastDunningLevel: false
        InterestOnArrears: 3.5
        WithInterestOnArrears: false
      properties:
        Description:
          description: Bezeichnung
          example: Standard
          maxLength: 30
          nullable: true
          type: string
        DeliveryMethod:
          description: |
            Versandart Kann nur gesetzt werden, wenn Sie im Arbeitsgebiet Extras/Einstellungen unter Versand/Mahnung festgelegt haben, dass die Mahnung entsprechend den Einstellungen beim Mahnungstyp versendet wird. - Per Brief (Letter) - Per E-Mail (Email) - Per Brief und E-Mail (LetterAndEmail)
          enum:
          - Letter
          - Email
          - LetterAndEmail
          example: Email
          nullable: true
          type: string
        PostArrearsFeeAndInterest:
          description: |
            Mahngebühren und Verzugszinsen buchen. Kann nur gesetzt werden, wenn Sie im Arbeitsgebiet Extras/Einstellungen unter Belege/Mahnung festgelegt haben, dass die anfallenden Mahngebühren und Verzugszinsen gebucht werden sollen.
          example: false
          nullable: true
          type: boolean
        WithInterestOnArrears:
          description: Verzugszinsen berechnen
          example: false
          nullable: true
          type: boolean
        InterestOnArrears:
          description: |
            Verzugszinsen in Prozent Wert kann nur angegeben werden, wenn Verzugszinsen berechnet werden sollen (WithInterestOnArrears = true).
          example: 3.5
          format: double
          maximum: 999.99
          minimum: 0.01
          nullable: true
          type: number
        RepeatLastDunningLevel:
          description: Letzte Mahnstufe wiederholen
          example: false
          nullable: true
          type: boolean
        NumberOfRepeats:
          description: |
            Anzahl Wiederholungen der letzten Mahnstufe Wert kann nur angegeben werden, wenn die letzte Mahnstufe wiederholt werden soll (RepeatLastDunningLevel = true).
          example: 1
          maximum: 999
          minimum: 1
          nullable: true
